<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Housewarming Potluck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Nunito", sans-serif;
      background-color: #FFF6EC;
      background-image: radial-gradient(circle, #f5c89a 1px, transparent 1px);
      background-size: 28px 28px;
      color: #2a1a0e;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }
    input, textarea {
      font-family: "Nunito", sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      border: 2px solid #e8d5c0;
      border-radius: 12px;
      background: #fff;
      color: #2a1a0e;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-weight: 600;
    }
    input:focus, textarea:focus { border-color: #f4845f; box-shadow: 0 0 0 3px rgba(244,132,95,0.15); }
    input::placeholder, textarea::placeholder { font-weight: 400; color: #bba898; }
    button {
      font-family: "Nunito", sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      border: 2px solid #e8d5c0;
      border-radius: 50px;
      background: #fff;
      cursor: pointer;
      color: #2a1a0e;
      transition: all 0.15s;
    }
    button:hover { background: #FFF0E5; border-color: #f4845f; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.35; cursor: default; transform: none; }
    .btn-primary { background: #f4845f; border-color: #f4845f; color: #fff; }
    .btn-primary:hover { background: #e8704a; border-color: #e8704a; }
    .btn-danger { color: #c0392b; border-color: #f5c6c6; }
    .btn-danger:hover { background: #fff5f5; border-color: #e57373; }
    a { color: #e07040; text-decoration: none; font-weight: 700; }
    a:hover { text-decoration: underline; }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .pop-in { animation: popIn 0.2s ease; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.22s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SECTIONS = [
      { id: "appetisers", label: "Appetisers",          icon: "🥗", bg: "#FFF3DC", border: "#f5c542", text: "#5a3e00", pill: "#f5c542" },
      { id: "mains",      label: "Mains",               icon: "🍽️", bg: "#FFECE6", border: "#f4845f", text: "#5a1a00", pill: "#f4845f" },
      { id: "sides",      label: "Sides",               icon: "🥘", bg: "#E8F7F0", border: "#52b788", text: "#0a3d22", pill: "#52b788" },
      { id: "carbs",      label: "Carbs & Rice",        icon: "🍚", bg: "#FFF0FA", border: "#d98ee6", text: "#45005a", pill: "#d98ee6" },
      { id: "desserts",   label: "Desserts",            icon: "🍰", bg: "#FFF0F0", border: "#f06292", text: "#5a0020", pill: "#f06292" },
      { id: "drinks",     label: "Drinks",              icon: "🥂", bg: "#EAF4FF", border: "#5aabf5", text: "#002f5a", pill: "#5aabf5" },
      { id: "others",     label: "Others / Mood Maker", icon: "✨", bg: "#F3F0FF", border: "#9b7ff5", text: "#200a5a", pill: "#9b7ff5" },
    ];

    const EMPTY_FORM = { name: "", person: "", remarks: "", link: "", photo: null };
    const REACTION_EMOJIS = ["🙌","😍","🔥","😋","👏","🥳","💯","❤️"];

    const store = {
      get: (key) => { try { return localStorage.getItem(key); } catch { return null; } },
      set: (key, val) => { try { localStorage.setItem(key, val); } catch {} },
    };

    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const maxDim = 300;
            const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.72));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function ReactionBar({ reactions = {}, onReact }) {
      return (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 8 }}>
          {REACTION_EMOJIS.map(e => {
            const count = reactions[e] || 0;
            return (
              <button key={e} onClick={() => onReact(e)} style={{
                fontSize: 13, padding: "2px 8px", borderRadius: 50,
                border: `2px solid ${count > 0 ? "#f4845f" : "#e8d5c0"}`,
                background: count > 0 ? "#fff3ef" : "#fff",
                display: "flex", alignItems: "center", gap: 3, fontWeight: 700,
              }}>
                <span style={{ fontSize: 14 }}>{e}</span>
                {count > 0 && <span style={{ fontSize: 11, color: "#f4845f" }}>{count}</span>}
              </button>
            );
          })}
        </div>
      );
    }

    function DishCard({ dish, section, onEdit, onDelete, onReact }) {
      const [hover, setHover] = useState(false);
      return (
        <div className="pop-in"
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            background: "#fff", border: `2px solid ${hover ? section.border : "#f0e8df"}`,
            borderRadius: 16, padding: "12px 14px", marginBottom: 8,
            transition: "border-color 0.15s, transform 0.15s",
            transform: hover ? "translateY(-2px)" : "none",
          }}>
          <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
            {dish.photo && (
              <img src={dish.photo} alt={dish.name}
                style={{ width: 52, height: 52, objectFit: "cover", borderRadius: 10, flexShrink: 0, border: "2px solid #f0e8df" }} />
            )}
            <div style={{ flex: 1, minWidth: 0 }}>
              <p style={{ fontWeight: 800, fontSize: 15, color: "#2a1a0e" }}>{dish.name}</p>
              <p style={{ fontSize: 12, color: "#b08060", fontWeight: 600, marginTop: 1 }}>✦ {dish.person}</p>
              {dish.remarks && <p style={{ fontSize: 12, color: "#7a6050", marginTop: 3, fontStyle: "italic" }}>{dish.remarks}</p>}
              {dish.link && <a href={dish.link} target="_blank" rel="noreferrer" style={{ fontSize: 11, display: "inline-block", marginTop: 3 }}>🔗 Recipe</a>}
            </div>
            {hover && (
              <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                <button onClick={onEdit} style={{ fontSize: 11, padding: "3px 10px" }}>Edit</button>
                <button onClick={onDelete} className="btn-danger" style={{ fontSize: 11, padding: "3px 10px" }}>✕</button>
              </div>
            )}
          </div>
          <ReactionBar reactions={dish.reactions} onReact={onReact} />
        </div>
      );
    }

    function SectionCard({ section, dishes, onAdd, onEdit, onDelete, onReact }) {
      return (
        <div style={{ background: section.bg, border: `2px solid ${section.border}`, borderRadius: 20, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "14px 16px 10px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 20 }}>{section.icon}</span>
              <span style={{ fontSize: 16, fontWeight: 400, color: section.text, fontFamily: "'Fredoka One', cursive" }}>{section.label}</span>
              {dishes.length > 0 && (
                <span style={{ fontSize: 11, background: section.pill, color: "#fff", borderRadius: 50, padding: "2px 8px", fontWeight: 800 }}>{dishes.length}</span>
              )}
            </div>
            <button onClick={onAdd} style={{
              width: 32, height: 32, borderRadius: "50%", border: `2px solid ${section.border}`,
              background: "#fff", cursor: "pointer", color: section.text,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 20, padding: 0, lineHeight: 1, fontWeight: 700, flexShrink: 0,
            }}>+</button>
          </div>
          <div style={{ padding: "0 10px 12px", flex: 1 }}>
            {dishes.length === 0 ? (
              <div style={{ padding: "14px 8px", textAlign: "center" }}>
                <p style={{ fontSize: 13, color: section.text, opacity: 0.5, fontWeight: 600 }}>Nothing yet — add the first! 🙋</p>
              </div>
            ) : (
              dishes.map(d => (
                <DishCard key={d.id} dish={d} section={section}
                  onEdit={() => onEdit(d)} onDelete={() => onDelete(d)}
                  onReact={(emoji) => onReact(section.id, d.id, emoji)} />
              ))
            )}
            {dishes.length > 0 && (
              <button onClick={onAdd} style={{ width: "100%", fontSize: 13, padding: "7px", background: "rgba(255,255,255,0.6)", borderColor: section.border, color: section.text, borderRadius: 12, marginTop: 2 }}>
                + Add another
              </button>
            )}
          </div>
        </div>
      );
    }

    function Modal({ children, onClose }) {
      return (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(42,26,14,0.4)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 100, padding: 16,
        }} onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="pop-in" style={{ background: "#fff", borderRadius: 24, padding: "24px 22px", width: "min(440px, 100%)", border: "3px solid #f4845f" }}>
            {children}
          </div>
        </div>
      );
    }

    function DishForm({ modal, form, setForm, onSave, onClose, fileRef, handlePhoto }) {
      const section = SECTIONS.find(s => s.id === modal.sectionId);
      const canSave = form.name.trim() && form.person.trim();
      return (
        <Modal onClose={onClose}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
            <h2 style={{ fontSize: 18, fontWeight: 400, fontFamily: "'Fredoka One', cursive", color: "#2a1a0e" }}>
              {section?.icon} {modal.mode === "add" ? `Add to ${section?.label}` : "Edit dish"}
            </h2>
            <button onClick={onClose} style={{ border: "none", background: "none", fontSize: 22, cursor: "pointer", color: "#b08060", lineHeight: 1, padding: "0 2px" }}>×</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <input placeholder="What's the dish? 🍴" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} style={{ width: "100%" }} autoFocus />
            <input placeholder="Your name 👋" value={form.person} onChange={e => setForm(f => ({ ...f, person: e.target.value }))} style={{ width: "100%" }} />
            <textarea placeholder="Notes? (dietary info, spice level, allergens...) 📝" value={form.remarks}
              onChange={e => setForm(f => ({ ...f, remarks: e.target.value }))} rows={2} style={{ width: "100%", resize: "vertical" }} />
            <input placeholder="Recipe link (optional) 🔗" value={form.link} onChange={e => setForm(f => ({ ...f, link: e.target.value }))} style={{ width: "100%" }} />
            <div>
              <input type="file" accept="image/*" ref={fileRef} onChange={handlePhoto} style={{ display: "none" }} />
              {form.photo ? (
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <img src={form.photo} alt="preview" style={{ width: 60, height: 60, objectFit: "cover", borderRadius: 12, border: "2px solid #f0e8df" }} />
                  <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                    <button onClick={() => fileRef.current.click()} style={{ fontSize: 12, padding: "5px 12px" }}>Change 📷</button>
                    <button onClick={() => setForm(f => ({ ...f, photo: null }))} className="btn-danger" style={{ fontSize: 12, padding: "5px 12px" }}>Remove</button>
                  </div>
                </div>
              ) : (
                <button onClick={() => fileRef.current.click()} style={{ fontSize: 13, padding: "7px 14px" }}>📷 Add a photo</button>
              )}
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 20 }}>
            <button onClick={onClose}>Cancel</button>
            <button onClick={onSave} disabled={!canSave} className="btn-primary">{modal.mode === "add" ? "Add dish 🎉" : "Save changes"}</button>
          </div>
        </Modal>
      );
    }

    const COMMENT_COLORS = [
      { bg: "#FFF3DC", border: "#f5c542" }, { bg: "#FFECE6", border: "#f4845f" },
      { bg: "#E8F7F0", border: "#52b788" }, { bg: "#FFF0FA", border: "#d98ee6" },
      { bg: "#EAF4FF", border: "#5aabf5" }, { bg: "#F3F0FF", border: "#9b7ff5" },
    ];

    function CommentBubble({ comment, onDelete }) {
      const [hover, setHover] = useState(false);
      const c = COMMENT_COLORS[comment.name.charCodeAt(0) % COMMENT_COLORS.length];
      return (
        <div className="slide-up"
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{ background: c.bg, border: `2px solid ${c.border}`, borderRadius: 16, padding: "12px 14px", marginBottom: 10, position: "relative" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
            <p style={{ fontWeight: 800, fontSize: 13, color: "#2a1a0e", marginBottom: 4 }}>
              {comment.name}
              <span style={{ fontWeight: 600, fontSize: 11, color: "#b08060", marginLeft: 8 }}>
                {new Date(comment.at).toLocaleDateString("en-SG", { day: "numeric", month: "short" })}
              </span>
            </p>
            {hover && (
              <button onClick={() => onDelete(comment.id)} className="btn-danger" style={{ fontSize: 11, padding: "3px 10px", flexShrink: 0 }}>✕</button>
            )}
          </div>
          <p style={{ fontSize: 14, color: "#3a2a1a", lineHeight: 1.55 }}>{comment.message}</p>
        </div>
      );
    }

    function CommentsSection({ comments, onAdd, onDelete }) {
      const [name, setName] = useState("");
      const [message, setMessage] = useState("");
      const canPost = name.trim() && message.trim();
      const handlePost = () => {
        if (!canPost) return;
        onAdd({ id: Date.now().toString(), name: name.trim(), message: message.trim(), at: new Date().toISOString() });
        setMessage("");
      };
      return (
        <div style={{ marginTop: 52 }}>
          <h2 style={{ fontFamily: "'Fredoka One', cursive", fontSize: 28, color: "#2a1a0e", marginBottom: 4, textAlign: "center" }}>💬 Hype Wall</h2>
          <p style={{ textAlign: "center", fontSize: 13, color: "#b08060", fontWeight: 600, marginBottom: 22 }}>Leave a message, shout-out, or hype for the food!</p>
          <div style={{ background: "#fff", border: "2px solid #f4845f", borderRadius: 20, padding: "18px 18px 14px", marginBottom: 20 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <input placeholder="Your name 🙋" value={name} onChange={e => setName(e.target.value)} style={{ width: "100%" }} />
              <textarea placeholder="What's on your mind? Drop some hype! 🎉" value={message}
                onChange={e => setMessage(e.target.value)} rows={3} style={{ width: "100%", resize: "vertical" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 12 }}>
              <button onClick={handlePost} disabled={!canPost} className="btn-primary">Post 🚀</button>
            </div>
          </div>
          {comments.length === 0 ? (
            <div style={{ textAlign: "center", padding: "28px 0" }}>
              <p style={{ fontSize: 13, color: "#c0a898", fontWeight: 600 }}>No messages yet — be the first to hype! 🎊</p>
            </div>
          ) : (
            <div>{[...comments].reverse().map(c => <CommentBubble key={c.id} comment={c} onDelete={onDelete} />)}</div>
          )}
        </div>
      );
    }

    function App() {
      const [title, setTitle] = useState("Housewarming Potluck");
      const [subtitle, setSubtitle] = useState("Bring a dish, bring a smile 🏡");
      const [description, setDescription] = useState("");
      const [dishes, setDishes] = useState({});
      const [comments, setComments] = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal, setModal] = useState(null);
      const [form, setForm] = useState(EMPTY_FORM);
      const [editingTitle, setEditingTitle] = useState(false);
      const [titleDraft, setTitleDraft] = useState("");
      const [subtitleDraft, setSubtitleDraft] = useState("");
      const [descriptionDraft, setDescriptionDraft] = useState("");
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const fileRef = useRef();

      useEffect(() => {
        const empty = {};
        SECTIONS.forEach(s => empty[s.id] = []);
        const t = store.get("potluck:title"); if (t) setTitle(t);
        const sub = store.get("potluck:subtitle"); if (sub) setSubtitle(sub);
        const desc = store.get("potluck:description"); if (desc) setDescription(desc);
        for (const s of SECTIONS) {
          try { const r = store.get(`potluck:dishes:${s.id}`); if (r) empty[s.id] = JSON.parse(r); } catch {}
        }
        try { const c = store.get("potluck:comments"); if (c) setComments(JSON.parse(c)); } catch {}
        setDishes(empty);
        setLoading(false);
      }, []);

      const persist = (id, list) => store.set(`potluck:dishes:${id}`, JSON.stringify(list));

      const openAdd = (sectionId) => { setForm(EMPTY_FORM); setModal({ sectionId, mode: "add" }); };
      const openEdit = (sectionId, dish) => {
        setForm({ name: dish.name, person: dish.person, remarks: dish.remarks || "", link: dish.link || "", photo: dish.photo || null });
        setModal({ sectionId, mode: "edit", dishId: dish.id });
      };

      const handleSave = () => {
        if (!form.name.trim() || !form.person.trim()) return;
        const { sectionId, mode, dishId } = modal;
        const current = dishes[sectionId] || [];
        const newList = mode === "add"
          ? [...current, { id: Date.now().toString(), name: form.name.trim(), person: form.person.trim(), remarks: form.remarks.trim(), link: form.link.trim(), photo: form.photo, reactions: {} }]
          : current.map(d => d.id === dishId ? { ...d, name: form.name.trim(), person: form.person.trim(), remarks: form.remarks.trim(), link: form.link.trim(), photo: form.photo } : d);
        setDishes(prev => ({ ...prev, [sectionId]: newList }));
        persist(sectionId, newList);
        setModal(null);
      };

      const handleDelete = () => {
        const { sectionId, dishId } = deleteConfirm;
        const newList = (dishes[sectionId] || []).filter(d => d.id !== dishId);
        setDishes(prev => ({ ...prev, [sectionId]: newList }));
        persist(sectionId, newList);
        setDeleteConfirm(null);
      };

      const handleReact = (sectionId, dishId, emoji) => {
        const newList = (dishes[sectionId] || []).map(d => {
          if (d.id !== dishId) return d;
          const reactions = { ...(d.reactions || {}) };
          reactions[emoji] = (reactions[emoji] || 0) + 1;
          return { ...d, reactions };
        });
        setDishes(prev => ({ ...prev, [sectionId]: newList }));
        persist(sectionId, newList);
      };

      const handlePhoto = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const compressed = await compressImage(file);
        setForm(f => ({ ...f, photo: compressed }));
        e.target.value = "";
      };

      const startEditTitle = () => { setTitleDraft(title); setSubtitleDraft(subtitle); setDescriptionDraft(description); setEditingTitle(true); };
      const saveTitle = () => {
        const t = titleDraft.trim() || title;
        const s = subtitleDraft.trim() || subtitle;
        const d = descriptionDraft.trim();
        setTitle(t); setSubtitle(s); setDescription(d); setEditingTitle(false);
        store.set("potluck:title", t); store.set("potluck:subtitle", s); store.set("potluck:description", d);
      };

      const addComment = (comment) => {
        const updated = [...comments, comment];
        setComments(updated);
        store.set("potluck:comments", JSON.stringify(updated));
      };

      const deleteComment = (id) => {
        const updated = comments.filter(c => c.id !== id);
        setComments(updated);
        store.set("potluck:comments", JSON.stringify(updated));
      };

      const totalCount = Object.values(dishes).reduce((s, a) => s + a.length, 0);

      if (loading) return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "60vh" }}>
          <p style={{ fontFamily: "'Fredoka One', cursive", fontSize: 22, color: "#f4845f" }}>Setting the table... 🍽️</p>
        </div>
      );

      return (
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "36px 16px 60px" }}>

          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: "2.5rem" }}>
            {editingTitle ? (
              <div style={{ background: "#fff", border: "3px solid #f4845f", borderRadius: 24, padding: "24px 20px", maxWidth: 460, margin: "0 auto", display: "flex", flexDirection: "column", gap: 10 }}>
                <input value={titleDraft} onChange={e => setTitleDraft(e.target.value)} style={{ textAlign: "center", fontSize: 20, fontWeight: 800, width: "100%" }} placeholder="Event title" />
                <input value={subtitleDraft} onChange={e => setSubtitleDraft(e.target.value)} style={{ textAlign: "center", fontSize: 14, width: "100%" }} placeholder="Tagline" />
                <textarea value={descriptionDraft} onChange={e => setDescriptionDraft(e.target.value)}
                  placeholder="Date, time, venue, what to bring... (optional)"
                  rows={3} style={{ width: "100%", resize: "vertical", textAlign: "center", fontSize: 13 }} />
                <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                  <button onClick={() => setEditingTitle(false)}>Cancel</button>
                  <button onClick={saveTitle} className="btn-primary">Save ✓</button>
                </div>
              </div>
            ) : (
              <>
                <h1 style={{ fontFamily: "'Fredoka One', cursive", fontSize: 44, color: "#2a1a0e", marginBottom: 6, lineHeight: 1.1 }}>{title}</h1>
                <p style={{ fontSize: 16, color: "#b08060", fontWeight: 700, marginBottom: description ? 12 : 8 }}>{subtitle}</p>
                {description && (
                  <div style={{ display: "inline-block", background: "#fff", border: "2px solid #f0e8df", borderRadius: 16, padding: "10px 18px", marginBottom: 14, maxWidth: 520 }}>
                    <p style={{ fontSize: 13, color: "#5a3a2a", lineHeight: 1.6, whiteSpace: "pre-wrap", fontWeight: 600 }}>{description}</p>
                  </div>
                )}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginTop: description ? 0 : 4 }}>
                  <span style={{ fontSize: 13, background: "#f4845f", color: "#fff", borderRadius: 50, padding: "3px 14px", fontWeight: 800 }}>
                    🍴 {totalCount} {totalCount === 1 ? "dish" : "dishes"}
                  </span>
                  <button onClick={startEditTitle} style={{ fontSize: 12, padding: "4px 12px" }}>✏️ Edit details</button>
                </div>
              </>
            )}
          </div>

          {/* Sections grid */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 16 }}>
            {SECTIONS.map(section => (
              <SectionCard key={section.id} section={section}
                dishes={dishes[section.id] || []}
                onAdd={() => openAdd(section.id)}
                onEdit={dish => openEdit(section.id, dish)}
                onDelete={dish => setDeleteConfirm({ sectionId: section.id, dishId: dish.id, dishName: dish.name })}
                onReact={handleReact} />
            ))}
          </div>

          {/* Hype Wall */}
          <CommentsSection comments={comments} onAdd={addComment} onDelete={deleteComment} />

          <p style={{ textAlign: "center", marginTop: "2.5rem", fontSize: 11, color: "#d0b8a0", fontWeight: 600 }}>Saved in your browser's local storage</p>

          {modal && <DishForm modal={modal} form={form} setForm={setForm} onSave={handleSave} onClose={() => setModal(null)} fileRef={fileRef} handlePhoto={handlePhoto} />}

          {deleteConfirm && (
            <Modal onClose={() => setDeleteConfirm(null)}>
              <p style={{ marginBottom: 16, fontSize: 15, fontWeight: 700 }}>Remove <span style={{ color: "#f4845f" }}>{deleteConfirm.dishName}</span> from the list?</p>
              <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                <button onClick={() => setDeleteConfirm(null)}>Cancel</button>
                <button onClick={handleDelete} className="btn-danger">Remove</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
